*{

font-family:'Google Sans',sans-serif;

/* hide vertical scrollbar */
html,
body{

html::-webkit-scrollbar,

body{

.header{

background:#121212;

.app-info{
display:flex;

}

.install-btn{

display:inline-block;

text-decoration:none;
padding:13px 28px;
border-radius:50px;
font-weight:700;
font-size:15px;
width:max-content;
transition:0.2s;
border:none;
cursor:pointer;
}

.install-btn:active{
transform:scale(0.97);
}

.section{
padding:20px;
}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:15px;
}

.description{
color:#cfcfcf;
line-height:1.7;
font-size:15px;
}

.screenshots{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:5px;
scrollbar-width:none;
-ms-overflow-style:none;
}

.screenshots::-webkit-scrollbar{
display:none;
}

.screenshots img{
width:220px;
height:430px;
object-fit:cover;
border-radius:20px;
flex-shrink:0;
}

.info-box{
background:#1e1e1e;
border-radius:18px;
padding:18px;
display:flex;
justify-content:space-between;
text-align:center;
}

.info-box div{
flex:1;
}

.info-box h2{
font-size:18px;
}

.info-box p{
font-size:13px;
color:#9e9e9e;
margin-top:5px;

.footer{
padding:20px;
text-align:center;
color:#777;
